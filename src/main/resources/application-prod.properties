# ── Production profile (Railway / Render / any cloud) ────────────────────────
# Set SPRING_PROFILES_ACTIVE=prod in your deployment environment

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/taskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false

jwt.secret=${JWT_SECRET:ChangeThisToASecureRandomStringInProduction==}
jwt.expiration=${JWT_EXPIRATION:86400000}

notifications.email.enabled=${EMAIL_ENABLED:false}
spring.mail.username=${MAIL_USERNAME:noreply@taskmanager.com}
spring.mail.password=${MAIL_PASSWORD:}

# Disable Swagger in production (set to true to keep it enabled)
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
